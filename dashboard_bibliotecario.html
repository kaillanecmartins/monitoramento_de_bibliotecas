<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard Bibliotecário</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <section class="hero is-fullheight">
      <div class="hero-body">
        <div class="container">
          <h1 class="title has-text-centered">Dashboard do Bibliotecário</h1>

          <p id="status" class="has-text-centered">Conectando...</p>
          <!-- Cards responsáveis por exibir os dados dos sensores -->
          <div class="columns is-multiline is-centered">
            <div
              class="column is-12-mobile is-6-tablet is-4-desktop is-3-widescreen"
            >
              <div class="card sensor-card has-text-centered p-5">
                <div class="sensor-title">Temperatura</div>
                <div id="temp" class="sensor-value">-- °C</div>
              </div>
            </div>

            <div
              class="column is-12-mobile is-6-tablet is-4-desktop is-3-widescreen"
            >
              <div class="card sensor-card has-text-centered p-5">
                <div class="sensor-title">Umidade</div>
                <div id="hum" class="sensor-value">-- %</div>
              </div>
            </div>

            <div
              class="column is-12-mobile is-6-tablet is-4-desktop is-3-widescreen"
            >
              <div class="card sensor-card has-text-centered p-5">
                <div class="sensor-title">Cabine 1</div>
                <div id="movimento1" class="sensor-value">--</div>
              </div>
            </div>

            <div
              class="column is-12-mobile is-6-tablet is-4-desktop is-3-widescreen"
            >
              <div class="card sensor-card has-text-centered p-5">
                <div class="sensor-title">Cabine 2</div>
                <div id="movimento2" class="sensor-value">--</div>
              </div>
            </div>
          </div>
          <!-- Painel de alertas -->
          <div class="box mt-5" id="painel-alertas">
            <h2 class="title is-5 has-text-centered">Alertas do Ambiente</h2>

            <div
              id="alerta-temperatura"
              class="notification is-warning"
              style="display: none"
            >
              <span class="icon">
                <i class="fa-solid fa-temperature-high"></i>
              </span>

              Temperatura acima do recomendado.
            </div>

            <div
              id="alerta-umidade"
              class="notification is-danger"
              style="display: none"
            >
              <span class="icon">
                <i class="fa-solid fa-droplet"></i>
              </span>

              Umidade acima do recomendado.
            </div>

            <div id="sem-alertas" class="notification is-success">
              <span class="icon">
                <i class="fa-solid fa-circle-check"></i>
              </span>

              Ambiente dentro das condições ideais.
            </div>
          </div>
        </div>
      </div>
    </section>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>

    <script src="js/mqtt.js"></script>

    <script src="js/bibliotecario.js"></script>
  </body>
</html>
