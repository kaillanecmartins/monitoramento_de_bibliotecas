<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard do Estudante</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <section class="hero is-fullheight">
      <div class="hero-body">
        <div class="container">
          <h1 class="title has-text-centered">Dashboard do Estudante</h1>
          <!-- Cards responsáveis por exibir os dados das cabines -->
          <div class="columns is-centered">
            <div class="column is-5">
              <div class="card sensor-card has-text-centered p-6">
                <div class="sensor-title">Cabines Disponíveis</div>

                <div
                  id="totalCabines"
                  class="sensor-value"
                  style="font-size: 4rem"
                >
                  --
                </div>

                <p class="mt-3">Atualização em tempo real</p>

                <button class="button is-link mt-5" id="btnMapa">
                  Visualizar mapa
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
    <div class="modal" id="modalMapa">
      <div class="modal-background"></div>

      <div class="modal-card">
        <header class="modal-card-head">
          <p class="modal-card-title">Mapa das Cabines</p>

          <button class="delete" id="fecharMapa"></button>
        </header>

        <section class="modal-card-body">
          <div class="mapa-biblioteca">
            <div class="titulo-mapa">Mapa das cabines</div>

            <div class="columns">
              <div class="column">
                <div class="cabine" id="cab1Mapa">
                  <strong>Cabine 1</strong>

                  <p>Livre</p>
                </div>
              </div>

              <div class="column">
                <div class="cabine" id="cab2Mapa">
                  <strong>Cabine 2</strong>

                  <p>Livre</p>
                </div>
              </div>
            </div>

            <div class="legenda">
              <div class="item-legenda">
                <div class="cor-legenda livre"></div>
                <span>Cabine disponível</span>
              </div>

              <div class="item-legenda">
                <div class="cor-legenda ocupada"></div>
                <span>Cabine ocupada</span>
              </div>
            </div>
          </div>
        </section>
      </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>

    <script src="js/mqtt.js"></script>

    <script src="js/estudante.js"></script>
  </body>
</html>
