<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <title>Sistema de Monitoramento</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <link rel="stylesheet" href="css/style.css" />

    <style>
      .card-menu {
        cursor: pointer;

        transition: 0.3s;

        height: 260px;

        display: flex;

        flex-direction: column;

        justify-content: center;
      }

      .card-menu:hover {
        transform: translateY(-8px);

        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      }

      .menu-icon {
        font-size: 4rem;

        margin-bottom: 20px;

        color: #485fc7;
      }
    </style>
  </head>

  <body>
    <section class="hero is-fullheight">
      <div class="hero-body">
        <div class="container">
          <h1 class="title has-text-centered mb-2">
            Sistema de Monitoramento da Biblioteca
          </h1>

          <p class="subtitle has-text-centered mb-6">
            Kaillane Martins
          </p>
          
          <p class="subtitle has-text-centered mb-6">
            Selecione o tipo de acesso
          </p>

          <div class="columns is-centered">
            <div class="column is-4">
              <div
                class="card card-menu has-text-centered"
                onclick="window.location = 'dashboard_estudante.html'"
              >
                <div class="card-content">
                  <span class="icon menu-icon">
                    <i class="fa-solid fa-user-graduate"></i>
                  </span>

                  <h2 class="title is-4">Estudante</h2>

                  <p>Consultar disponibilidade das cabines.</p>
                </div>
              </div>
            </div>

            <div class="column is-4">
              <div
                class="card card-menu has-text-centered"
                onclick="window.location = 'dashboard_bibliotecario.html'"
              >
                <div class="card-content">
                  <span class="icon menu-icon">
                    <i class="fa-solid fa-book"></i>
                  </span>

                  <h2 class="title is-4">Bibliotecário</h2>

                  <p>Monitoramento e administração.</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
