<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard IoT</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
    />
    <link rel="stylesheet" href="css/style.css">
  </head>

  <body>
    <section class="hero is-fullheight">
      <div class="hero-body">
        <div class="container">
          <h1 class="title has-text-centered">
            Projeto IoT - Monitoramento de Bibliotecas
          </h1>

          <h2 class="subtitle has-text-centered mt-3 mb-6">Kaillane Martins</h2>

          <!-- Cards responsáveis por exibir os dados dos sensores -->
          <div class="columns is-multiline is-centered">
            <div
              class="column is-12-mobile is-6-tablet is-4-desktop is-3-widescreen"
            >
              <div class="card sensor-card has-text-centered p-5">
                <div class="sensor-title">Temperatura</div>
                <div id="temp" class="sensor-value">-- °C</div>
              </div>
            </div>

            <div
              class="column is-12-mobile is-6-tablet is-4-desktop is-3-widescreen"
            >
              <div class="card sensor-card has-text-centered p-5">
                <div class="sensor-title">Umidade</div>
                <div id="hum" class="sensor-value">-- %</div>
              </div>
            </div>

            <div
              class="column is-12-mobile is-6-tablet is-4-desktop is-3-widescreen"
            >
              <div class="card sensor-card has-text-centered p-5">
                <div class="sensor-title">Cabine 1</div>
                <div id="movimento1" class="sensor-value">--</div>
              </div>
            </div>

            <div
              class="column is-12-mobile is-6-tablet is-4-desktop is-3-widescreen"
            >
              <div class="card sensor-card has-text-centered p-5">
                <div class="sensor-title">Cabine 2</div>
                <div id="movimento2" class="sensor-value">--</div>
              </div>
            </div>
          </div>
          <!-- Alerta exibido quando a umidade ultrapassa o limite configurado -->
          <div
            id="alerta-umidade"
            class="notification is-danger has-text-centered mt-4"
            style="display: none"
          >
            Alerta: Umidade acima do limite permitido!
          </div>

          <!-- Área de exibição do status da conexão MQTT -->
          <div class="box mt-6" style="max-width: 450px; margin: auto">
            <h2 class="title is-5 has-text-centered">Status do Sistema</h2>

            <p id="status" class="has-text-centered status-erro">
              Conectando...
            </p>
          </div>
        </div>
      </div>
    </section>

    <!-- Biblioteca MQTT para comunicação em tempo real -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>

    <script>
      // Cria um cliente MQTT WebSocket para comunicação com o broker
      const client = new Paho.MQTT.Client(
        "broker.emqx.io",
        8084,
        "web_" + Math.random(),
      );

      // Executado sempre que uma nova mensagem MQTT é recebida
      client.onMessageArrived = function (message) {
        // Converte a mensagem recebida para objeto JSON
        const data = JSON.parse(message.payloadString);

        // Atualiza os valores de temperatura e umidade no dashboard
        document.getElementById("temp").textContent =
          data.temperatura.toFixed(1) + " °C";

        document.getElementById("hum").textContent =
          data.umidade.toFixed(1) + " %";

        const alertaUmidade = document.getElementById("alerta-umidade");

        //alerta de umidade elevada (acima de 65%)
        if (data.umidade > 65) {
          alertaUmidade.style.display = "block";
        } else {
          alertaUmidade.style.display = "none";
        }

        // Atualiza o status de ocupação da Cabine 1
        const pir = document.getElementById("movimento2");
        const ir1 = document.getElementById("movimento1");

        if (data.movimento1 == 0) {
          ir1.textContent = "Ocupada";
          ir1.className = "sensor-value alerta";
        } else {
          ir1.textContent = "Vazia";
          ir1.className = "sensor-value ok";
        }

        if (data.movimento2 == 0) {
          pir.textContent = "Ocupada";
          pir.className = "sensor-value alerta";
        } else {
          pir.textContent = "Vazia";
          pir.className = "sensor-value ok";
        }
      };

      /**
       * Realiza a conexão com o broker MQTT e
       * realiza a inscrição no tópico de sensores.
       */
      function conectar() {
        client.connect({
          useSSL: true,

          onSuccess: () => {
            const status = document.getElementById("status");

            status.textContent = "Conectado";
            status.className = "has-text-centered status-ok";

            client.subscribe("kai/sensores");
          },

          onFailure: () => {
            const status = document.getElementById("status");

            status.textContent = "Reconectando...";

            status.className = "has-text-centered status-erro";

            setTimeout(conectar, 2000);
          },
        });
      }
      conectar();
    </script>
  </body>
</html>
